<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neurodiverse AI MasterClass</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/brain-header.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* === SPA Shell — ONLY layout, nothing else === */
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0A0A14;color:#F8F8FC;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    .spa-shell{display:flex;height:100vh;height:100dvh;width:100%}

    /* Sidebar */
    .spa-sidebar{width:280px;min-width:280px;background:var(--purple-surface);border-right:1px solid rgba(168,85,247,.15);display:flex;flex-direction:column;overflow:hidden;transition:margin-left .3s ease,opacity .3s ease}
    .spa-sidebar.collapsed{margin-left:-280px;opacity:0;pointer-events:none}
    .sidebar-header{padding:20px 16px 12px 48px;border-bottom:1px solid rgba(168,85,247,.1);flex-shrink:0}
    .sidebar-header h1{font-family:var(--font-heading);font-size:1.1rem;font-weight:700;color:var(--text-primary);margin:0;display:flex;align-items:center;gap:8px}
    .sidebar-header p{font-size:.75rem;color:var(--text-muted);margin:6px 0 0}
    .sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
    .sidebar-nav::-webkit-scrollbar{width:4px}
    .sidebar-nav::-webkit-scrollbar-thumb{background:rgba(168,85,247,.2);border-radius:2px}
    .nav-section{padding:12px 16px 4px;font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--purple-light)}
    .nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:.85rem;color:var(--text-secondary);text-decoration:none;cursor:pointer;transition:background .15s ease,color .15s ease;border:none;background:none;width:100%;text-align:left;font-family:inherit}
    .nav-item:hover{background:var(--purple-surface-hover);color:var(--text-primary)}
    .nav-item.active{background:rgba(168,85,247,.15);color:var(--purple-neon);font-weight:600}
    .nav-item .nav-icon{font-size:1rem;width:22px;text-align:center;flex-shrink:0}
    .nav-item .nav-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* Main content area — scrollable */
    .spa-main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;background:#0A0A14}
    .spa-main::-webkit-scrollbar{width:6px}
    .spa-main::-webkit-scrollbar-thumb{background:rgba(168,85,247,.25);border-radius:3px}
    #content-area{min-height:100%;opacity:1;transition:opacity .2s ease;position:relative;z-index:1}
    #content-area.loading{opacity:.3}

    /* Loader */
    .spa-loader{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10}
    .spa-loader.active{display:block}
    .spinner{width:40px;height:40px;border:3px solid rgba(168,85,247,.15);border-top-color:var(--purple-neon);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Sidebar toggle */
    .sidebar-toggle{position:fixed;top:8px;left:8px;z-index:100;width:44px;height:44px;border-radius:8px;border:1px solid rgba(168,85,247,.2);background:var(--purple-surface);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:background .15s ease}
    .sidebar-toggle:hover{background:var(--purple-surface-hover)}

    /* === SPA Content Fixes === */
    /* Hide standalone nav-bar (SPA has sidebar) */
    #content-area .nav-bar{display:none}
    #content-area .nav-footer .nav-link{cursor:pointer}
    #content-area pre{white-space:pre-wrap;word-wrap:break-word;overflow-wrap:break-word;max-width:100%}

    /* Brain header: STICKY — pins at top, content slides over it */
    /* (position:sticky comes from brain-header.css — we do NOT override it) */

    /* Content flows over sticky brain header — transparent so animation shows through */
    #content-area .page,
    #content-area .page-wrapper{position:relative;z-index:2}

    /* Show brain header h1 (design-system.css hides all h1) */
    #content-area .brain-header-text h1{display:block !important;opacity:1 !important;transform:none !important}

    /* Brain header text: visible initially, fades when .hidden class applied on scroll */
    #content-area .brain-header-text .tagline,
    #content-area .brain-header-text .pill{opacity:1;transform:none}
    #content-area .brain-header-text.hidden .tagline,
    #content-area .brain-header-text.hidden .pill,
    #content-area .brain-header-text.hidden h1{opacity:0 !important;transition:opacity 0.4s ease}

    /* Force content visibility (override fadeUp animation delays) */
    #content-area h2,#content-area h3,#content-area p,#content-area .callout,
    #content-area details,#content-area pre,#content-area ul,#content-area ol,
    #content-area blockquote,#content-area .c,#content-area .hero,
    #content-area .hero-icon,#content-area .hero-tagline,#content-area .hero-pill{
      opacity:1 !important;transform:none !important;
    }

    /* Responsive */
    @media(max-width:768px){
      .spa-sidebar{position:fixed;top:0;left:0;bottom:0;z-index:50;box-shadow:4px 0 20px rgba(0,0,0,.5)}
      .spa-sidebar.collapsed{margin-left:-280px}
      .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}
      .sidebar-overlay.active{display:block}
    }
    /* Auto-collapse sidebar on narrow screens (Notion iframe typical width) */
    @media(max-width:600px){
      .spa-sidebar{margin-left:-280px;opacity:0;pointer-events:none}
    }
  </style>
</head>
<body>
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle navigation">&#x2630;</button>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="spa-shell">
    <aside class="spa-sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>&#x1F9E0; MasterClass</h1>
        <p>Your pace is the right pace</p>
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <div class="nav-section">&#x1F680; Start Here</div>
        <button class="nav-item" data-page="index"><span class="nav-icon">&#x1F3E0;</span><span class="nav-label">Course Home</span></button>
        <button class="nav-item" data-page="first-ai-conversation"><span class="nav-icon">&#x1F4AC;</span><span class="nav-label">Your First AI Conversation</span></button>
        <button class="nav-item" data-page="playground"><span class="nav-icon">&#x26A1;</span><span class="nav-label">AI Playground</span></button>
        <div class="nav-section">&#x2699;&#xFE0F; Set Up Your Tools</div>
        <button class="nav-item" data-page="setup-your-tools"><span class="nav-icon">&#x1F527;</span><span class="nav-label">Set Up Your AI Tools</span></button>
        <button class="nav-item" data-page="prompt-basics"><span class="nav-icon">&#x270D;&#xFE0F;</span><span class="nav-label">Prompt Basics</span></button>
        <button class="nav-item" data-page="connect-ai"><span class="nav-icon">&#x1F517;</span><span class="nav-label">Connect AI to Template</span></button>
        <div class="nav-section">&#x1F9ED; Build Your AI Profile</div>
        <button class="nav-item" data-page="onboarding-interview"><span class="nav-icon">&#x1F9ED;</span><span class="nav-label">Onboarding Interview</span></button>
        <button class="nav-item" data-page="ai-profile"><span class="nav-icon">&#x1F464;</span><span class="nav-label">Your AI Profile</span></button>
        <div class="nav-section">&#x1F3AF; Go Deeper</div>
        <button class="nav-item" data-page="writing-voice"><span class="nav-icon">&#x270D;&#xFE0F;</span><span class="nav-label">AI Writing Voice</span></button>
        <button class="nav-item" data-page="research-analysis"><span class="nav-icon">&#x1F50D;</span><span class="nav-label">Research &amp; Analysis</span></button>
        <button class="nav-item" data-page="work-productivity"><span class="nav-icon">&#x1F4BC;</span><span class="nav-label">Work &amp; Productivity</span></button>
        <button class="nav-item" data-page="creative-projects"><span class="nav-icon">&#x1F3A8;</span><span class="nav-label">Creative Projects</span></button>
        <button class="nav-item" data-page="life-management"><span class="nav-icon">&#x1F3E0;</span><span class="nav-label">Life Management</span></button>
        <div class="nav-section">&#x1F52C; Power User</div>
        <button class="nav-item" data-page="mcp-automation"><span class="nav-icon">&#x26A1;</span><span class="nav-label">MCP &amp; Automation</span></button>
        <div class="nav-section">&#x1F6E0;&#xFE0F; Resources</div>
        <button class="nav-item" data-page="reference-library"><span class="nav-icon">&#x1F4DA;</span><span class="nav-label">Reference Library</span></button>
        <div class="nav-section">&#x1F9F0; Templates</div>
        <button class="nav-item" data-page="life-templates"><span class="nav-icon">&#x1F373;</span><span class="nav-label">Life Templates</span></button>
        <button class="nav-item" data-page="emergency-toolkit"><span class="nav-icon">&#x1F6A8;</span><span class="nav-label">Emergency Toolkit</span></button>
        <div class="nav-section">&#x1F4CA; Progress</div>
        <button class="nav-item" data-page="your-progress"><span class="nav-icon">&#x1F4CA;</span><span class="nav-label">Your Data &amp; Progress</span></button>
      </nav>
    </aside>
    <main class="spa-main" id="spaMain">
      <div class="spa-loader" id="loader"><div class="spinner"></div></div>
      <div id="content-area"></div>
    </main>
  </div>
  <script src="js/spa-router.js"></script>
</body>
</html>
