<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Up Your Tools — Neurodiverse AI MasterClass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0A0A14;
  --bg-alt: #0E0E1A;
  --card: rgba(255,255,255,0.04);
  --card-hover: rgba(168,85,247,0.08);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(168,85,247,0.25);
  --text: #FFFFFF;
  --text-mid: rgba(255,255,255,0.72);
  --text-dim: rgba(255,255,255,0.42);
  --purple-deep: #6B3FA0;
  --purple-mid: #9B72CF;
  --purple-neon: #A855F7;
  --purple-glow: rgba(168,85,247,0.15);
  --green: #34D399;
  --green-glow: rgba(52,211,153,0.1);
  --green-border: rgba(52,211,153,0.2);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: 1.55;
  min-height: 100vh;
}

/* Typography */
.eyebrow {
  display: block;
  font-size: 0.7rem; font-weight: 600;
  letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--purple-neon);
  margin-bottom: 1rem;
  text-align: center;
  opacity: 0; animation: fadeUp 0.8s var(--ease) 0.15s forwards;
}
.page-title {
  font-size: clamp(2rem, 5.5vw, 3.8rem);
  font-weight: 800; letter-spacing: -0.035em;
  line-height: 1.08; text-align: center;
  margin-bottom: 1.1rem;
  opacity: 0; animation: fadeUp 0.8s var(--ease) 0.3s forwards;
}
.page-title .hl {
  background: linear-gradient(135deg, var(--purple-mid), var(--purple-neon), #E879F9);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; color: transparent;
}
.page-sub {
  font-size: 1.08rem; font-weight: 300;
  color: var(--text-mid); text-align: center;
  max-width: 530px; margin: 0 auto 2.8rem; line-height: 1.7;
  opacity: 0; animation: fadeUp 0.8s var(--ease) 0.45s forwards;
}

/* Vignette */
.vignette {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh; z-index: 1;
  background: radial-gradient(ellipse at 50% 35%, transparent 25%, var(--bg) 72%);
  pointer-events: none;
}

/* Layout */
.section {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 4.5rem 2rem 5rem; position: relative;
}

/* Grids */
.grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 1rem; width: 100%; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; width: 100%; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap: 1rem; width: 100%; }

/* Nav Cards */
.nav-card {
  padding: 1.75rem 1.5rem; position: relative; overflow: hidden;
  text-decoration: none; color: var(--text); display: block;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  transition: all 0.45s var(--ease);
  opacity: 0; transform: translateY(24px);
}
.nav-card.visible {
  opacity: 1; transform: translateY(0);
}
.nav-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--purple-neon), transparent);
  opacity: 0; transition: opacity 0.4s ease;
}
.nav-card::after {
  content: ''; position: absolute; inset: 0;
  border-radius: 16px;
  background: radial-gradient(ellipse at 50% 0%, rgba(168,85,247,0.06), transparent 70%);
  opacity: 0; transition: opacity 0.4s ease;
}
.nav-card:hover {
  background: var(--card-hover); border-color: var(--border-hover);
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(168,85,247,0.1), 0 2px 12px rgba(0,0,0,0.3);
}
.nav-card.visible:hover { transform: translateY(-4px); }
.nav-card:hover::before { opacity: 1; }
.nav-card:hover::after { opacity: 1; }
.nav-card .card-icon { font-size: 1.7rem; margin-bottom: 0.8rem; filter: saturate(0.9); }
.nav-card h3 { font-size: 1rem; font-weight: 650; margin-bottom: 0.4rem; letter-spacing: -0.01em; }
.nav-card p { font-size: 0.82rem; color: var(--text-mid); line-height: 1.55; font-weight: 350; }
.nav-card .card-meta {
  margin-top: 0.75rem; font-size: 0.7rem; color: var(--text-dim);
  font-weight: 400; letter-spacing: 0.02em;
}

/* Header Banner (content pages) */
.header-banner {
  width: 100%; min-height: 320px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 3.5rem 2rem;
  position: relative; overflow: hidden;
  background: var(--bg);
}
.header-banner canvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%; z-index: 0;
}
.header-banner .hb-content { position: relative; z-index: 2; }
.header-banner .vignette-inner {
  position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(ellipse at 50% 35%, transparent 18%, var(--bg) 68%);
}
.header-banner .eyebrow { margin-bottom: 0.7rem; }
.header-banner .page-title { font-size: clamp(1.7rem, 4.5vw, 3rem); margin-bottom: 0.65rem; }
.header-banner .page-sub { font-size: 0.95rem; margin-bottom: 1.5rem; max-width: 480px; }
.header-banner .meta-row {
  display: flex; gap: 1.8rem; justify-content: center;
  flex-wrap: wrap; margin-top: 0.4rem;
  opacity: 0; animation: fadeUp 0.8s var(--ease) 0.6s forwards;
}
.header-banner .meta-item {
  font-size: 0.75rem; color: var(--text-dim); font-weight: 400;
  display: flex; align-items: center; gap: 0.35rem;
  letter-spacing: 0.01em;
}

/* Bottom divider line for header banners */
.header-banner::after {
  content: ''; position: absolute; bottom: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(168,85,247,0.2), transparent);
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Responsive */
@media (max-width: 768px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .section { padding: 3rem 1.25rem; }
  .header-banner { min-height: 260px; padding: 2.5rem 1.25rem; }
  .nav-card { padding: 1.4rem 1.25rem; }
}
@media (min-width: 769px) and (max-width: 1024px) {
  .grid-3 { grid-template-columns: repeat(2,1fr); }
}

</style>
</head>
<body>

<div class="header-banner">
  <canvas id="brain-canvas"></canvas>
  <div class="vignette-inner"></div>
  <div class="hb-content">
    <span class="eyebrow">Set Up Your Tools</span>
    <h1 class="page-title">Memory, Projects &amp; <span class='hl'>Custom Instructions</span></h1>
    <p class="page-sub">Turn on memory, create a project, polish your custom instructions so AI actually remembers you.</p>
    <div class="meta-row">
      <span class="meta-item">⏱ 15 min</span><span class="meta-item">⚡ Medium energy</span><span class="meta-item">🎯 Phase 2</span>
    </div>
  </div>
</div>

<script>

const BrainAnimation = (() => {
  const COLORS = [
    [200,60,220],[130,90,255],[168,85,247],[100,200,255],[80,230,170],[230,130,255]
  ];
  const GOLD = [190,160,85];

  function seededRandom(seed) {
    let s = seed;
    return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
  }

  function easeInOutCubic(t) {
    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
  }

  function init(canvasId, opts) {
    opts = opts || {};
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const mode = opts.mode || 'scroll';
    const intensity = opts.intensity || 0.35;
    let W, H, cx, cy, scale;
    let brainPoints = [], neuralPaths = [], nodes = [];
    let scrollProgress = mode === 'static' ? intensity : 0;
    let animatedProgress = scrollProgress;
    let pulseTime = 0;

    function resize() {
      const parent = canvas.parentElement;
      if (parent && parent.classList.contains('header-banner')) {
        const rect = parent.getBoundingClientRect();
        W = canvas.width = rect.width;
        H = canvas.height = rect.height;
      } else {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      cx = W / 2; cy = H / 2;
      scale = Math.min(W, H) / 620;
      generateGeometry();
    }

    function generateGeometry() {
      brainPoints = [];
      for (let i = 0; i < 360; i++) {
        const t = i * Math.PI / 180;
        let x = 220 * Math.cos(t) * scale;
        let y = 175 * Math.sin(t) * scale;
        if (i>40&&i<130) { const f=Math.sin((i-40)*2*Math.PI/180); y-=30*f*scale; x+=12*f*scale; }
        if (i>80&&i<145) { y-=18*Math.sin((i-80)*3*Math.PI/180)*scale; }
        if (i>135&&i<205) { x-=22*Math.sin((i-135)*2.6*Math.PI/180)*scale; }
        if (i>165&&i<225) { const f=Math.sin((i-165)*3*Math.PI/180); x-=28*f*scale; y+=18*f*scale; }
        if (i>230&&i<310) { const f=Math.sin((i-230)*2.25*Math.PI/180); const sq=0.45+0.55*(1-f); x*=sq; y=y*0.72+45*f*scale; }
        brainPoints.push({ x: cx+x, y: cy+y-15*scale });
      }

      const rng = seededRandom(42);
      neuralPaths = [];
      for (let p = 0; p < 55; p++) {
        const angle = rng()*Math.PI*2;
        const r = (20+rng()*160)*scale;
        let px = cx+r*Math.cos(angle), py = cy+r*Math.sin(angle)-15*scale;
        const pts = [{x:px,y:py}];
        let a = rng()*Math.PI*2;
        for (let s=0; s<4+Math.floor(rng()*10); s++) {
          a += (rng()-0.5)*1.6;
          const len = (12+rng()*40)*scale;
          const nx=pts[pts.length-1].x+len*Math.cos(a);
          const ny=pts[pts.length-1].y+len*Math.sin(a);
          if (Math.sqrt((nx-cx)**2+(ny-(cy-15*scale))**2)>195*scale) { a+=Math.PI*0.3; continue; }
          pts.push({x:nx,y:ny});
        }
        neuralPaths.push({pts, colorIdx:p%6, width:0.5+rng()*1.5});
      }

      const rng2 = seededRandom(99);
      nodes = [];
      for (let n=0; n<60; n++) {
        const angle = rng2()*Math.PI*2;
        const r = (25+rng2()*175)*scale;
        nodes.push({
          x:cx+r*Math.cos(angle), y:cy+r*Math.sin(angle)-15*scale,
          r:(2+rng2()*4)*scale/1.8, colorIdx:n%6
        });
      }
    }

    function draw() {
      if (mode === 'pulse') {
        pulseTime += 0.008;
        scrollProgress = 0.18 + 0.14 * Math.sin(pulseTime);
      }
      animatedProgress += (scrollProgress - animatedProgress) * (mode === 'scroll' ? 0.08 : 0.04);
      const p = easeInOutCubic(Math.min(1, Math.max(0, animatedProgress)));

      ctx.clearRect(0, 0, W, H);

      // Ambient glow
      if (p > 0.03) {
        const glowR = 200*scale*p;
        const grad = ctx.createRadialGradient(cx, cy-15*scale, 0, cx, cy-15*scale, glowR);
        grad.addColorStop(0, 'rgba(168,85,247,' + (0.1*p) + ')');
        grad.addColorStop(0.5, 'rgba(130,60,220,' + (0.05*p) + ')');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,W,H);
      }

      // Brain outline
      ctx.beginPath();
      for (let i=0; i<brainPoints.length; i++) {
        const bp = brainPoints[i];
        i===0 ? ctx.moveTo(bp.x,bp.y) : ctx.lineTo(bp.x,bp.y);
      }
      ctx.closePath();
      const outA = 0.15 + 0.4*p;
      if (p < 0.5) {
        ctx.strokeStyle = 'rgba(' + GOLD[0] + ',' + GOLD[1] + ',' + GOLD[2] + ',' + outA + ')';
        ctx.lineWidth = 1.5;
      } else {
        const cp = (p-0.5)*2;
        const r = Math.round(GOLD[0]*(1-cp)+168*cp);
        const g = Math.round(GOLD[1]*(1-cp)+85*cp);
        const b = Math.round(GOLD[2]*(1-cp)+247*cp);
        ctx.strokeStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + (outA+0.2*cp) + ')';
        ctx.lineWidth = 1.5+cp;
      }
      ctx.shadowColor = p<0.5 ? 'rgba(' + GOLD[0] + ',' + GOLD[1] + ',' + GOLD[2] + ',' + (0.3*outA) + ')' : 'rgba(168,85,247,' + (0.4*p) + ')';
      ctx.shadowBlur = 12+10*p;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Neural paths
      const pathsToShow = Math.floor(neuralPaths.length * p);
      for (let i=0; i<pathsToShow; i++) {
        const np = neuralPaths[i];
        const pp = Math.min(1, (p-i/neuralPaths.length)*neuralPaths.length*0.5);
        if (pp<=0 || np.pts.length<2) continue;
        const show = Math.max(2, Math.floor(np.pts.length*Math.min(1,pp*1.5)));
        const c = COLORS[np.colorIdx];
        const alpha = Math.min(0.7, pp*0.7);
        ctx.beginPath();
        for (let j=0;j<show;j++) j===0?ctx.moveTo(np.pts[j].x,np.pts[j].y):ctx.lineTo(np.pts[j].x,np.pts[j].y);
        ctx.strokeStyle = 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + alpha + ')';
        ctx.lineWidth = np.width;
        ctx.shadowColor = 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + (alpha*0.5) + ')';
        ctx.shadowBlur = 8;
        ctx.stroke();
      }
      ctx.shadowBlur = 0;

      // Nodes
      if (p > 0.25) {
        const np2 = Math.min(1, (p-0.25)/0.75);
        const show = Math.floor(nodes.length*np2);
        for (let i=0; i<show; i++) {
          const n = nodes[i];
          const nA = Math.min(1, (np2-i/nodes.length)*nodes.length*0.3);
          if (nA<=0) continue;
          const c = COLORS[n.colorIdx];
          const grd = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*3);
          grd.addColorStop(0, 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + (nA*0.4) + ')');
          grd.addColorStop(1, 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',0)');
          ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(n.x,n.y,n.r*3,0,Math.PI*2); ctx.fill();
          ctx.fillStyle='rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + (nA*0.9) + ')';
          ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
        }
      }

      // Spark (dim gold at start)
      const sparkA = Math.max(0, 1-p*2.5);
      if (sparkA>0) {
        const sx=cx-70*scale, sy=cy-130*scale;
        const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,25*scale);
        sg.addColorStop(0, 'rgba(255,220,120,' + (sparkA*0.6) + ')');
        sg.addColorStop(1, 'rgba(255,220,120,0)');
        ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy,25*scale,0,Math.PI*2); ctx.fill();
      }

      requestAnimationFrame(draw);
    }

    function updateScroll() {
      const docH = document.documentElement.scrollHeight - window.innerHeight;
      scrollProgress = docH > 0 ? window.scrollY / docH : 0;
      canvas.style.opacity = Math.max(0.15, 0.85 - scrollProgress*0.5);
    }

    window.addEventListener('resize', resize);
    if (mode === 'scroll') {
      window.addEventListener('scroll', updateScroll, { passive: true });
    }

    resize();
    if (mode === 'scroll') updateScroll();
    requestAnimationFrame(draw);
  }

  return { init: init };
})();

</script>
<script>BrainAnimation.init('brain-canvas', { mode: 'pulse' });</script>
</body>
</html>
